    <script>
      (function() {
        try {
          var p = JSON.parse(localStorage.getItem('tz-preferences') || '{}');
          if (p.theme === 'dark') document.documentElement.classList.add('dark');
          else if (p.theme === 'light') document.documentElement.classList.add('light');
        } catch(e) {}
      })();
    </script>
